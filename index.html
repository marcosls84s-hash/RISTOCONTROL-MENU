<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menù Digitale - RistoControl</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #FF9800; --dark: #2D3436; --bg: #F9F9F9; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        .header { background: white; padding: 40px 20px; text-align: center; border-bottom: 6px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .header h1 { margin: 0; font-size: 30px; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; font-weight: 900; }
        .header p { margin: 10px 0 0; font-weight: 300; color: #636e72; font-style: italic; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px 80px; }
        .category-title { background: var(--dark); color: white; padding: 12px 20px; border-radius: 50px; display: inline-block; font-weight: bold; margin: 35px 0 15px; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .dish-card { background: white; padding: 20px; margin-bottom: 12px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); }
        .dish-name { font-weight: 700; font-size: 18px; color: #2d3436; }
        .dish-price { font-weight: 900; color: var(--primary); font-size: 19px; }
        #status-msg { text-align: center; padding: 100px 20px; color: #b2bec3; font-size: 18px; }
        .footer { text-align: center; padding: 30px; font-size: 11px; color: #b2bec3; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="resName">RISTOCONTROL</h1>
        <p>Menù Digitale - Sempre Aggiornato</p>
    </div>

    <div class="container">
        <div id="status-msg">🔌 Connessione al ristorante...</div>
        <div id="menuUI"></div>
    </div>

    <div class="footer">
        Powered by RistoControl<br>
        Sviluppato da Gennaro Bevo
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://comandaristorante-facile-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const resId = new URLSearchParams(window.location.search).get('res');

        if (!resId) {
            document.getElementById('status-msg').innerHTML = "⚠️ LINK NON VALIDO<br><small>Usa il QR Code presente sui tavoli</small>";
        } else {
            const resRef = db.ref("restaurants/" + resId);
            
            // Carica Nome Locale
            resRef.child("info/name").on("value", (s) => {
                if (s.exists()) document.getElementById('resName').innerText = s.val().toUpperCase();
            });

            // Carica Menù Real-Time
            resRef.child("menu").on("value", (snap) => {
                const msg = document.getElementById('status-msg');
                const ui = document.getElementById('menuUI');
                ui.innerHTML = "";
                
                if (snap.exists()) {
                    msg.style.display = 'none';
                    const dishes = [];
                    snap.forEach(c => dishes.push(c.val()));
                    
                    const categories = [...new Set(dishes.map(d => d.category))];
                    categories.forEach(cat => {
                        const h = document.createElement('div');
                        h.className = 'category-title';
                        h.innerText = cat;
                        ui.appendChild(h);
                        
                        dishes.filter(d => d.category === cat).forEach(d => {
                            const card = document.createElement('div');
                            card.className = 'dish-card';
                            card.innerHTML = `<div class="dish-name">${d.name}</div><div class="dish-price">€ ${d.price.toFixed(2).replace('.',',')}</div>`;
                            ui.appendChild(card);
                        });
                    });
                } else {
                    msg.innerText = "📭 Il menù è in fase di allestimento.";
                }
            }, (err) => {
                msg.innerHTML = "🚫 Accesso negato: " + err.message + "<br><small>Controlla le Firebase Rules</small>";
            });
        }
    </script>
</body>
</html>
